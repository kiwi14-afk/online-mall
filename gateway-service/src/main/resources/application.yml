server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: public
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # 路由配置
      routes:
        # ----- 用户服务 -----
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=0

        # ----- 商品服务 -----
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product/**
          filters:
            - StripPrefix=0

        # ----- 订单服务 -----
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        # ----- 支付服务 -----
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
          filters:
            - StripPrefix=0

    sentinel:
      transport:
        dashboard: sentinel:8858
        port: 8719
      eager: true
      # Sentinel Gateway 限流规则
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"message":"请求过于频繁，请稍后重试","data":null}'

# JWT 配置
jwt:
  secret: online-mall-secret-key-2026-software-service-engineering
  expire-hours: 24

# 白名单路径（不需要JWT鉴权）
auth:
  exclude-paths:
    - /api/user/login
    - /api/user/register
    - /api/product/list
    - /api/product/category/list
    - /api/product/*/stock/**
    - GET:/api/product/*

logging:
  level:
    com.mall.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
