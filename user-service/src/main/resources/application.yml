server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: false  # 本地开发时关闭，联调时开启

jwt:
  secret: online-mall-jwt-secret-key-2026-software-service-engineering
  expiration: 86400000  # 24小时

logging:
  level:
    com.mall: DEBUG
