# ============================================
# Seata Server 配置
# 使用 DB 存储模式，数据存于 order_db 中
# ============================================
server:
  port: 7091

spring:
  application:
    name: seata-server

logging:
  console:
    user: seata
  level:
    io.seata: INFO

seata:
  config:
    type: nacos
    nacos:
      server-addr: nacos:8848
      group: SEATA_GROUP
      namespace: public
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      server-addr: nacos:8848
      group: SEATA_GROUP
      namespace: public
      application: seata-server
  server:
    service-port: 8091
  store:
    mode: db
    db:
      datasource: druid
      db-type: mysql
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://mysql-order:3306/order_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      user: root
      password: root123
  security:
    secretKey: seata-secret-key
    tokenValidityInMilliseconds: 1800000
